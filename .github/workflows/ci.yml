name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CUE
        uses: cue-lang/setup-cue@v1.0.1
        with:
          version: 'latest'

      - name: Validate vocab
        run: cue vet ./vocab/...

      - name: Validate patterns
        run: cue vet ./patterns/...

      - name: Validate examples
        run: |
          cue vet -c=false ./examples/3-layer.cue
          cue vet -c=false ./examples/type-composition.cue
          cue vet -c=false ./examples/jsonld-export.cue

      - name: Validate reference
        run: cue vet -c=false ./reference/...

  generate:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install CUE
        uses: cue-lang/setup-cue@v1.0.1
        with:
          version: 'latest'

      - name: Generate outputs
        run: |
          mkdir -p out
          cue export ./vocab -e context --out json > out/context.jsonld
          cue export ./examples/3-layer.cue -e output --out json > out/3-layer.json
          cue export ./examples/type-composition.cue -e output --out json > out/type-composition.json
          cue export ./examples/jsonld-export.cue --out json > out/jsonld-graph.json
          cue export ./reference/inventory.cue -e output --out json > out/inventory.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quicue-exports
          path: out/
