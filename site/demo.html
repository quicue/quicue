<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quicue - Full Demo</title>
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            overflow: hidden;
        }
        #cy {
            position: absolute;
            top: 60px;
            left: 0;
            right: 400px;
            bottom: 0;
            background: #161b22;
        }
        .header {
            height: 60px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 500;
        }
        .header h1 span { color: #8b949e; font-weight: 400; }
        .progress-bar {
            flex: 1;
            max-width: 400px;
            height: 4px;
            background: #30363d;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #3fb950);
            transition: width 0.3s;
        }
        .step-counter {
            font-size: 0.85rem;
            color: #8b949e;
        }
        .sidebar {
            position: absolute;
            top: 60px;
            right: 0;
            width: 400px;
            bottom: 0;
            background: #0d1117;
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        .narration {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }
        .narration h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #58a6ff;
        }
        .narration p {
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        .narration strong { color: #fff; }
        .narration .highlight { color: #3fb950; }
        .narration .warning { color: #d29922; }
        .narration .critical { color: #f85149; }
        .narration code {
            background: #21262d;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .narration ul {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }
        .narration li {
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }
        .controls {
            padding: 1rem 1.5rem;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 0.75rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            border: 1px solid #30363d;
            background: #21262d;
            color: #c9d1d9;
            transition: all 0.2s;
        }
        .btn:hover { background: #30363d; }
        .btn.primary {
            background: #238636;
            border-color: #238636;
            color: white;
            flex: 1;
        }
        .btn.primary:hover { background: #2ea043; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #21262d;
            font-size: 0.9rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #8b949e; }
        .info-value { font-family: monospace; }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge.spof { background: #da363333; color: #f85149; }
        .badge.coupling { background: #d2992233; color: #d29922; }
        .badge.ok { background: #23863633; color: #3fb950; }
        .exit-link {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .exit-link:hover { color: #c9d1d9; }
        #example-select {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-left: auto;
        }
        #example-select:hover { background: #30363d; }
        /* Simulated node style */
        .simulated-node {
            border-style: dashed !important;
            opacity: 0.85;
        }
        /* What-if form */
        .whatif-form { margin: 1rem 0; }
        .whatif-form label {
            display: block;
            font-size: 0.8rem;
            color: #8b949e;
            margin-bottom: 0.25rem;
            margin-top: 0.75rem;
        }
        .whatif-form input,
        .whatif-form select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
            font-size: 0.9rem;
        }
        .whatif-form input:focus,
        .whatif-form select:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .whatif-form select[multiple] {
            height: auto;
            min-height: 80px;
        }
        .type-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }
        .type-checkbox {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.8rem;
            background: #21262d;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .type-checkbox:hover { background: #30363d; }
        .type-checkbox input { width: auto; margin: 0; }
        .btn-simulate {
            width: 100%;
            padding: 0.75rem;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn-simulate:hover { background: #2ea043; }
        .btn-simulate:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
        .validation-result {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .validation-result.success { background: #23863633; border: 1px solid #238636; }
        .validation-result.error { background: #da363333; border: 1px solid #da3633; }
        .validation-result ul { margin: 0.5rem 0 0 1rem; padding: 0; }
        .validation-result li { margin-bottom: 0.25rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>quicue <span>/ full demo</span></h1>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <div class="step-counter"><span id="current-step">1</span> / <span id="total-steps">12</span></div>
        <select id="example-select">
            <option value="operational">Ops Stack (8 nodes)</option>
            <option value="incident-cascade">Incident Cascade (9 nodes)</option>
            <option value="cicd-pipeline">CI/CD Pipeline (9 nodes)</option>
            <option value="microservices-mesh">Microservices (12 nodes)</option>
            <option value="cab-datacenter">CAB Datacenter (7 nodes)</option>
            <option value="topdesk-import">TopDesk CMDB (8 nodes)</option>
            <option value="vmware-import">VMware vSphere (10 nodes)</option>
            <option value="multi-region">Multi-Region HA (22 nodes)</option>
            <option value="kubernetes">Kubernetes (15 nodes)</option>
            <option value="terraform-aws">Terraform AWS (12 nodes)</option>
        </select>
        <a href="index.html" class="exit-link">Exit to Explorer</a>
    </div>

    <div id="cy"></div>

    <div class="sidebar">
        <div class="narration" id="narration"></div>
        <div class="controls">
            <button class="btn" id="btn-prev" onclick="prevStep()">Back</button>
            <button class="btn primary" id="btn-next" onclick="nextStep()">Next</button>
        </div>
    </div>

    <script>
    let cy = null;
    let currentStep = 0;
    let graphData = null;
    let simulatedNode = null;
    let currentExample = 'operational';

    // Dynamic step generators based on loaded data
    function generateSteps() {
        const nodeCount = graphData.nodes.length;
        const edgeCount = graphData.edges.length;
        const maxDepth = graphData.metrics?.maxDepth || Math.max(...graphData.nodes.map(n => n.depth));
        const rootId = graphData.roots?.[0] || graphData.nodes.find(n => n.depth === 0)?.id;
        const spofs = graphData.spof || graphData.nodes.filter(n => n.dependents > 0).slice(0, 4);
        const coupling = graphData.coupling || graphData.nodes.filter(n => n.dependents > 2);

        // Find a good target for impact analysis (high dependents, not root)
        const impactTarget = graphData.nodes
            .filter(n => n.dependents > 0 && n.depth > 0)
            .sort((a, b) => b.dependents - a.dependents)[0] || graphData.nodes[1];

        // Find nodes affected by the impact target
        const affectedNodes = graphData.nodes.filter(n =>
            n.ancestors && n.ancestors.includes(impactTarget?.id)
        );

        // Find a candidate for what-if simulation (a node that could have a replica)
        const replicaCandidate = graphData.nodes
            .filter(n => n.dependents > 0 && n.depth > 0 && n.depth < maxDepth)
            .sort((a, b) => b.dependents - a.dependents)[0] || graphData.nodes[1];

        // Find a long path for path finding demo
        const leafNode = graphData.leaves?.[0] || graphData.nodes.find(n => n.dependents === 0)?.id;

        return [
        {
            title: "The Problem",
            content: `
                <p><strong>Infrastructure changes break things.</strong></p>
                <p>You've seen it happen:</p>
                <ul>
                    <li>"We updated the cache config... and auth stopped working"</li>
                    <li>"DNS maintenance took down 16 services"</li>
                    <li>"Nobody knew the API depended on that queue"</li>
                </ul>
                <p>The knowledge of <strong>what depends on what</strong> lives in people's heads, outdated wikis, or nowhere at all.</p>
                <p>quicue fixes this.</p>
            `,
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                cy.fit(50);
            }
        },
        {
            title: "The Graph",
            content: `
                <p>This is your infrastructure as a <strong>dependency graph</strong>.</p>
                <p>Each node is a resource. Each edge means "depends on".</p>
                <div class="info-panel">
                    <div class="info-row"><span class="info-label">Resources</span><span class="info-value">${nodeCount}</span></div>
                    <div class="info-row"><span class="info-label">Dependencies</span><span class="info-value">${edgeCount}</span></div>
                    <div class="info-row"><span class="info-label">Max depth</span><span class="info-value">${maxDepth} layers</span></div>
                </div>
                <p>The color shows <strong>criticality</strong> - redder nodes have more things depending on them.</p>
            `,
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                cy.fit(50);
            }
        },
        {
            title: "Impact Analysis",
            content: `
                <p>The core feature: <strong>blast radius analysis</strong>.</p>
                <p>Question: "If <code>${impactTarget?.id}</code> goes down, what breaks?"</p>
                <p>Watch what happens when we simulate a failure...</p>
            `,
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                const target = cy.$id(impactTarget?.id);
                if (target.length) {
                    cy.animate({ center: { eles: target }, zoom: 1.3, duration: 500 });
                }
            }
        },
        {
            title: "Blast Radius",
            content: `
                <p><span class="critical">${affectedNodes.length} service${affectedNodes.length !== 1 ? 's' : ''}</span> would fail if <code>${impactTarget?.id}</code> goes down:</p>
                <ul>
                    ${affectedNodes.slice(0, 5).map(n => `<li><code>${n.id}</code></li>`).join('')}
                    ${affectedNodes.length > 5 ? `<li>...and ${affectedNodes.length - 5} more</li>` : ''}
                </ul>
                <p>You now know the impact <strong>before</strong> you touch anything.</p>
            `,
            action: () => {
                removeSimulatedNode();
                showImpact(impactTarget?.id);
                cy.fit(50);
            }
        },
        {
            title: "Single Points of Failure",
            content: `
                <p>quicue automatically detects <strong>SPOFs</strong> - resources with no redundant peer.</p>
                <div class="info-panel">
                    ${spofs.slice(0, 4).map(s => `<div class="info-row"><span class="info-label">${s.name || s.id}</span><span class="badge spof">SPOF</span></div>`).join('')}
                </div>
                <p>A SPOF is any resource that, if it fails, has no backup at its layer.</p>
            `,
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                spofs.slice(0, 4).forEach(s => {
                    cy.$id(s.name || s.id).addClass('impact-highlight');
                });
            }
        },
        {
            title: "Coupling Analysis",
            content: `
                <p><strong>Coupling points</strong> are resources that many others depend on.</p>
                <div class="info-panel">
                    ${coupling.slice(0, 3).map(c => {
                        const pct = c.percentage || Math.round((c.dependents / (nodeCount - 1)) * 100);
                        return `<div class="info-row"><span class="info-label">${c.name || c.id}</span><span class="info-value">${pct}% depend on this</span></div>`;
                    }).join('')}
                </div>
                <p>High coupling = high risk. These deserve extra monitoring, redundancy, or careful change management.</p>
            `,
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                if (coupling[0]) cy.$id(coupling[0].name || coupling[0].id).addClass('impact-source');
                if (coupling[1]) cy.$id(coupling[1].name || coupling[1].id).addClass('impact-highlight');
            }
        },
        {
            title: "Topology Layers",
            content: `
                <p>The graph computes <strong>deployment order</strong> automatically.</p>
                <div class="info-panel">
                    ${Object.entries(graphData.topology || {}).slice(0, 5).map(([layer, nodes]) => {
                        const layerNum = layer.replace('layer_', '');
                        const nodeList = Array.isArray(nodes) ? nodes.slice(0, 3).join(', ') : nodes;
                        const suffix = Array.isArray(nodes) && nodes.length > 3 ? '...' : '';
                        return `<div class="info-row"><span class="info-label">Layer ${layerNum}</span><span class="info-value">${nodeList}${suffix}</span></div>`;
                    }).join('')}
                </div>
                <p>Startup order: layer 0 first. Shutdown: reverse. No more guessing.</p>
            `,
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                cy.fit(50);
            }
        },
        {
            title: "Resource Types",
            content: `
                <p>Resources have <strong>types</strong> that describe what they are:</p>
                <ul>
                    ${graphData.nodes.slice(0, 3).map(n => {
                        const types = Object.keys(n.types || {}).slice(0, 2);
                        return `<li><code>${n.id}</code> is a <span class="highlight">${types[0] || 'Resource'}</span>${types[1] ? ` + <span class="warning">${types[1]}</span>` : ''}</li>`;
                    }).join('')}
                </ul>
                <p>Types enable filtering ("show me all databases") and validation ("every CriticalInfra should have a backup").</p>
            `,
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                graphData.nodes.slice(0, 3).forEach(n => {
                    cy.$id(n.id).addClass('impact-highlight');
                });
            }
        },
        {
            title: "What-If Simulation",
            content: (() => {
                // Collect all unique types from the graph
                const allTypes = new Set();
                graphData.nodes.forEach(n => {
                    if (n.types) Object.keys(n.types).forEach(t => allTypes.add(t));
                });
                const typeCheckboxes = Array.from(allTypes).sort()
                    .map(t => `<label class="type-checkbox"><input type="checkbox" value="${t}"> ${t}</label>`)
                    .join('');

                // Build dependency options
                const depOptions = graphData.nodes
                    .map(n => `<option value="${n.id}">${n.id}</option>`)
                    .join('');

                return `
                    <p>Define a new resource and <strong>validate</strong> it against the graph.</p>
                    <div class="whatif-form">
                        <label>Resource ID</label>
                        <input type="text" id="whatif-id" placeholder="e.g., cache-replica, db-standby">

                        <label>Types</label>
                        <div class="type-checkboxes" id="whatif-types">
                            ${typeCheckboxes}
                        </div>

                        <label>Dependencies (Ctrl+click for multiple)</label>
                        <select multiple id="whatif-deps">
                            ${depOptions}
                        </select>

                        <button class="btn-simulate" id="btn-simulate">Add to Graph</button>
                    </div>
                    <div id="validation-result"></div>
                `;
            })(),
            action: () => {
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                removeSimulatedNode();

                setTimeout(() => {
                    const btn = document.getElementById('btn-simulate');
                    if (btn) {
                        btn.onclick = () => {
                            const id = document.getElementById('whatif-id').value.trim();
                            const typeCheckboxes = document.querySelectorAll('#whatif-types input:checked');
                            const types = Array.from(typeCheckboxes).map(cb => cb.value);
                            const depsSelect = document.getElementById('whatif-deps');
                            const deps = Array.from(depsSelect.selectedOptions).map(o => o.value);
                            const resultDiv = document.getElementById('validation-result');

                            // Validation
                            const errors = [];

                            if (!id) {
                                errors.push('Resource ID is required');
                            } else if (graphData.nodes.some(n => n.id === id)) {
                                errors.push(`ID "${id}" already exists - each resource must have a unique identifier`);
                            } else if (!/^[a-z0-9-]+$/.test(id)) {
                                errors.push('ID must be lowercase letters, numbers, and hyphens only (e.g., "db-replica-01")');
                            }

                            if (errors.length > 0) {
                                resultDiv.className = 'validation-result error';
                                resultDiv.innerHTML = `<strong>Cannot add resource:</strong><ul>${errors.map(e => `<li>${e}</li>`).join('')}</ul>`;
                                return;
                            }

                            // Compute depth and topology placement
                            let depth = 0;
                            if (deps.length > 0) {
                                const depDepths = deps.map(d => {
                                    const node = graphData.nodes.find(n => n.id === d);
                                    return node ? node.depth : 0;
                                });
                                depth = Math.max(...depDepths) + 1;
                            }

                            // Compute full ancestor chain
                            const ancestors = new Set(deps);
                            deps.forEach(d => {
                                const node = graphData.nodes.find(n => n.id === d);
                                if (node?.ancestors) node.ancestors.forEach(a => ancestors.add(a));
                            });

                            // Find nodes with matching types (potential SPOF resolution)
                            const matchingTypeNodes = graphData.nodes.filter(n =>
                                n.types && types.some(t => n.types[t])
                            );
                            const spofsWithMatchingTypes = matchingTypeNodes.filter(n => n.dependents > 0);

                            // Find what would break if this new node fails (nothing yet, it has 0 dependents)
                            // But show what it provides redundancy for

                            // Get layer peers (other nodes at same depth)
                            const layerPeers = graphData.nodes.filter(n => n.depth === depth);

                            // Build the analysis HTML
                            let html = `<div style="margin-bottom: 0.75rem;"><strong style="color: #3fb950;">Resource Valid</strong></div>`;

                            // Topology section
                            html += `<div style="margin-bottom: 0.75rem;">
                                <div style="color: #58a6ff; font-size: 0.8rem; margin-bottom: 0.25rem;">TOPOLOGY</div>
                                <div style="font-size: 0.9rem;"><strong>Layer ${depth}</strong> - `;
                            if (depth === 0) {
                                html += `This will be a <strong>root node</strong> (no dependencies). It starts first during deployment and shuts down last.</div>`;
                            } else {
                                const layerNames = layerPeers.slice(0, 3).map(n => n.id).join(', ');
                                html += `alongside ${layerPeers.length > 0 ? layerNames : 'no other nodes'}${layerPeers.length > 3 ? '...' : ''}</div>`;
                                html += `<div style="font-size: 0.85rem; color: #8b949e; margin-top: 0.25rem;">
                                    Startup: after layer ${depth - 1} completes<br>
                                    Shutdown: before layer ${depth - 1} begins
                                </div>`;
                            }
                            html += `</div>`;

                            // Dependencies section
                            html += `<div style="margin-bottom: 0.75rem;">
                                <div style="color: #58a6ff; font-size: 0.8rem; margin-bottom: 0.25rem;">DEPENDENCIES</div>`;
                            if (deps.length === 0) {
                                html += `<div style="color: #d29922; font-size: 0.9rem;">No dependencies selected - this node has no upstream requirements</div>`;
                            } else {
                                html += `<div style="font-size: 0.9rem;"><strong>Direct:</strong> ${deps.join(', ')}</div>`;
                                if (ancestors.size > deps.length) {
                                    const transitiveOnly = Array.from(ancestors).filter(a => !deps.includes(a));
                                    html += `<div style="font-size: 0.85rem; color: #8b949e; margin-top: 0.25rem;">
                                        <strong>Transitive:</strong> ${transitiveOnly.slice(0, 5).join(', ')}${transitiveOnly.length > 5 ? ` (+${transitiveOnly.length - 5} more)` : ''}
                                    </div>`;
                                }
                                html += `<div style="font-size: 0.85rem; color: #8b949e; margin-top: 0.25rem;">
                                    If any of these ${ancestors.size} upstream nodes fail, <code>${id}</code> will be affected
                                </div>`;
                            }
                            html += `</div>`;

                            // Types & Redundancy section
                            html += `<div style="margin-bottom: 0.75rem;">
                                <div style="color: #58a6ff; font-size: 0.8rem; margin-bottom: 0.25rem;">TYPES & REDUNDANCY</div>`;
                            if (types.length === 0) {
                                html += `<div style="color: #d29922; font-size: 0.9rem;">No types selected - consider adding types for filtering and validation</div>`;
                            } else {
                                html += `<div style="font-size: 0.9rem;"><strong>Types:</strong> ${types.join(', ')}</div>`;
                                if (spofsWithMatchingTypes.length > 0) {
                                    html += `<div style="font-size: 0.85rem; color: #3fb950; margin-top: 0.25rem;">
                                        Provides redundancy for: <strong>${spofsWithMatchingTypes.map(n => n.id).join(', ')}</strong>
                                    </div>`;
                                    const resolvedSpofs = spofsWithMatchingTypes.filter(n => {
                                        const sameTypeAtLayer = matchingTypeNodes.filter(m => m.depth === n.depth && m.id !== n.id);
                                        return sameTypeAtLayer.length === 0; // Currently a SPOF
                                    });
                                    if (resolvedSpofs.length > 0 && depth === resolvedSpofs[0]?.depth) {
                                        html += `<div style="font-size: 0.85rem; color: #3fb950;">
                                            Resolves SPOF: <strong>${resolvedSpofs[0].id}</strong> will no longer be a single point of failure
                                        </div>`;
                                    }
                                } else {
                                    html += `<div style="font-size: 0.85rem; color: #8b949e; margin-top: 0.25rem;">
                                        No existing nodes share these types
                                    </div>`;
                                }
                            }
                            html += `</div>`;

                            // Impact section
                            html += `<div>
                                <div style="color: #58a6ff; font-size: 0.8rem; margin-bottom: 0.25rem;">BLAST RADIUS</div>
                                <div style="font-size: 0.9rem;">If <code>${id}</code> fails: <strong>0 nodes affected</strong> (new node, nothing depends on it yet)</div>
                            </div>`;

                            // Add the simulated node
                            removeSimulatedNode();
                            addCustomSimulatedNode(id, types, deps, depth);

                            resultDiv.className = 'validation-result success';
                            resultDiv.innerHTML = html;
                        };
                    }
                }, 100);
            }
        },
        {
            title: "Path Finding",
            content: (() => {
                // Build path from leaf to root
                const leaf = graphData.nodes.find(n => n.id === leafNode);
                const path = leaf?.ancestors ? [leafNode, ...leaf.ancestors.slice(0, 4)] : [leafNode, rootId];
                const pathDisplay = path.map((id, i) => {
                    const indent = '&nbsp;&nbsp;'.repeat(i);
                    return i === 0 ? id : `${indent}depends on ${id}`;
                }).join('<br>');
                return `
                    <p>"Why does <code>${leafNode}</code> depend on <code>${rootId}</code>?"</p>
                    <p>Find the <strong>dependency path</strong>:</p>
                    <div class="info-panel" style="font-family: monospace; font-size: 0.85rem;">
                        ${pathDisplay}
                    </div>
                    <p>${path.length - 1} hop${path.length !== 2 ? 's' : ''}. Now you understand the chain.</p>
                `;
            })(),
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                const leaf = graphData.nodes.find(n => n.id === leafNode);
                const path = leaf?.ancestors ? [leafNode, ...leaf.ancestors] : [leafNode, rootId];
                path.forEach(id => {
                    cy.$id(id).addClass('impact-highlight');
                });
                cy.edges().forEach(e => {
                    if (path.includes(e.source().id()) && path.includes(e.target().id())) {
                        e.addClass('impact-highlight');
                    }
                });
            }
        },
        {
            title: "Data Sources",
            content: `
                <p>quicue graphs can be populated from:</p>
                <ul>
                    <li><strong>CUE definitions</strong> - native schema language</li>
                    <li><strong>JSON-LD</strong> - semantic web format</li>
                    <li><strong>Terraform state</strong> - import existing IaC</li>
                    <li><strong>CMDB exports</strong> - TopDesk, ServiceNow adapters</li>
                </ul>
                <p>The graph is the <strong>single source of truth</strong>. Everything else computes from it.</p>
            `,
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                cy.fit(50);
            }
        },
        {
            title: "Explore",
            content: `
                <p>That's quicue: <strong>infrastructure dependency graphs with computable patterns</strong>.</p>
                <p>What you can do:</p>
                <ul>
                    <li>Impact analysis before changes</li>
                    <li>Auto-detect SPOFs and coupling</li>
                    <li>Compute startup/shutdown order</li>
                    <li>Simulate adding resources</li>
                    <li>Track changes over time</li>
                </ul>
                <p><a href="index.html" style="color: #58a6ff;">Open the full explorer</a> to try it yourself.</p>
            `,
            action: () => {
                removeSimulatedNode();
                cy.elements().removeClass('highlighted dimmed impact-source impact-highlight');
                cy.fit(50);
            }
        }
    ];
    }

    let demoSteps = [];

    function addSimulatedNode(baseNode) {
        if (!baseNode || simulatedNode) return;

        const replicaId = `${baseNode.id}-replica`;

        // Add the simulated node
        cy.add({
            group: 'nodes',
            data: {
                id: replicaId,
                dependents: 0,
                depth: baseNode.depth,
                simulated: true
            },
            classes: 'simulated-node'
        });

        // Add edges from the same parents as the original
        if (baseNode.ancestors) {
            // Find direct parents (nodes that have edges to this node)
            graphData.edges.filter(e => e.target === baseNode.id).forEach(e => {
                cy.add({
                    group: 'edges',
                    data: {
                        id: `${e.source}-${replicaId}`,
                        source: e.source,
                        target: replicaId,
                        simulated: true
                    },
                    classes: 'simulated-edge'
                });
            });
        }

        // Position near the original node
        const originalPos = cy.$id(baseNode.id).position();
        cy.$id(replicaId).position({
            x: originalPos.x + 80,
            y: originalPos.y + 60
        });

        // Style the simulated elements
        cy.$id(replicaId).style({
            'border-style': 'dashed',
            'border-color': '#3fb950',
            'border-width': 3,
            'background-color': '#238636',
            'label': replicaId + ' (simulated)'
        });

        cy.edges('[simulated]').style({
            'line-style': 'dashed',
            'line-color': '#3fb950',
            'target-arrow-color': '#3fb950'
        });

        // Highlight original and simulated
        cy.$id(baseNode.id).addClass('impact-highlight');
        cy.$id(replicaId).addClass('impact-highlight');

        simulatedNode = replicaId;
        cy.fit(50);
    }

    function removeSimulatedNode() {
        if (simulatedNode) {
            cy.$id(simulatedNode).remove();
            cy.edges('[simulated]').remove();
            simulatedNode = null;
        }
    }

    function addCustomSimulatedNode(id, types, deps, depth) {
        if (simulatedNode) removeSimulatedNode();

        // Add the node
        cy.add({
            group: 'nodes',
            data: {
                id: id,
                dependents: 0,
                depth: depth,
                types: types.reduce((acc, t) => { acc[t] = true; return acc; }, {}),
                simulated: true
            },
            classes: 'simulated-node'
        });

        // Add edges from dependencies
        deps.forEach(dep => {
            cy.add({
                group: 'edges',
                data: {
                    id: `${dep}-${id}`,
                    source: dep,
                    target: id,
                    simulated: true
                },
                classes: 'simulated-edge'
            });
        });

        // Position the node - find a good spot near its dependencies
        if (deps.length > 0) {
            const depPositions = deps.map(d => cy.$id(d).position()).filter(p => p);
            if (depPositions.length > 0) {
                const avgX = depPositions.reduce((sum, p) => sum + p.x, 0) / depPositions.length;
                const avgY = depPositions.reduce((sum, p) => sum + p.y, 0) / depPositions.length;
                cy.$id(id).position({ x: avgX + 100, y: avgY + 80 });
            }
        } else {
            // Root node - place near other roots
            const roots = graphData.roots || [];
            if (roots.length > 0) {
                const rootPos = cy.$id(roots[0]).position();
                cy.$id(id).position({ x: rootPos.x + 120, y: rootPos.y });
            }
        }

        // Style the node
        cy.$id(id).style({
            'border-style': 'dashed',
            'border-color': '#3fb950',
            'border-width': 3,
            'background-color': '#238636',
            'label': id + ' (new)'
        });

        cy.edges('[simulated]').style({
            'line-style': 'dashed',
            'line-color': '#3fb950',
            'target-arrow-color': '#3fb950'
        });

        // Highlight the new node and its dependencies
        cy.$id(id).addClass('impact-highlight');
        deps.forEach(d => cy.$id(d).addClass('impact-highlight'));

        simulatedNode = id;
        cy.fit(50);
    }

    async function loadGraph(example) {
        currentExample = example || 'operational';
        const resp = await fetch(`data/${currentExample}.json`);
        graphData = await resp.json();
        demoSteps = generateSteps();
        currentStep = 0;
        simulatedNode = null;
        initCytoscape();
        updateStep();
    }

    function initCytoscape() {
        const maxDeps = Math.max(...graphData.nodes.map(n => n.dependents));
        const rootId = graphData.roots?.[0] || graphData.nodes.find(n => n.depth === 0)?.id;

        cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [
                ...graphData.nodes.map(n => ({
                    data: { id: n.id, ...n }
                })),
                ...graphData.edges.map(e => ({
                    data: { id: `${e.source}-${e.target}`, source: e.source, target: e.target }
                }))
            ],
            style: [
                {
                    selector: 'node',
                    style: {
                        'label': 'data(id)',
                        'text-valign': 'bottom',
                        'text-margin-y': 8,
                        'font-size': '12px',
                        'color': '#8b949e',
                        'background-color': (ele) => criticalityColor(ele.data('dependents'), maxDeps),
                        'width': 40,
                        'height': 40,
                        'border-width': 2,
                        'border-color': '#30363d'
                    }
                },
                { selector: 'node.impact-source', style: { 'background-color': '#f85149', 'border-color': '#ff7b72', 'border-width': 4 } },
                { selector: 'node.impact-highlight', style: { 'border-color': '#f85149', 'border-width': 3 } },
                { selector: 'node.dimmed', style: { 'opacity': 0.2 } },
                { selector: 'node.simulated-node', style: { 'border-style': 'dashed', 'border-color': '#3fb950', 'border-width': 3, 'background-color': '#238636' } },
                { selector: 'edge', style: { 'width': 2, 'line-color': '#30363d', 'target-arrow-color': '#30363d', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier' } },
                { selector: 'edge.impact-highlight', style: { 'line-color': '#f85149', 'target-arrow-color': '#f85149', 'width': 3 } },
                { selector: 'edge.dimmed', style: { 'opacity': 0.1 } },
                { selector: 'edge.simulated-edge', style: { 'line-style': 'dashed', 'line-color': '#3fb950', 'target-arrow-color': '#3fb950' } }
            ],
            layout: {
                name: 'breadthfirst',
                directed: true,
                roots: rootId ? `#${rootId}` : undefined,
                spacingFactor: 1.5
            }
        });
    }

    function criticalityColor(deps, max) {
        if (max === 0) return '#58a6ff';
        const ratio = deps / max;
        if (ratio < 0.5) {
            const r = Math.round(88 + (240 - 88) * (ratio * 2));
            const g = Math.round(166 + (136 - 166) * (ratio * 2));
            const b = Math.round(255 + (62 - 255) * (ratio * 2));
            return `rgb(${r},${g},${b})`;
        } else {
            const r = Math.round(240 + (248 - 240) * ((ratio - 0.5) * 2));
            const g = Math.round(136 - 136 * ((ratio - 0.5) * 2));
            const b = Math.round(62 - 62 * ((ratio - 0.5) * 2));
            return `rgb(${r},${g},${b})`;
        }
    }

    function showImpact(targetId) {
        cy.elements().removeClass('impact-source impact-highlight dimmed');
        const target = cy.$id(targetId);
        if (!target.length) return;

        target.addClass('impact-source');

        // Find all nodes that depend on target (have target in ancestors)
        const affected = graphData.nodes.filter(n =>
            n.ancestors && n.ancestors.includes(targetId)
        ).map(n => n.id);

        cy.nodes().forEach(n => {
            if (affected.includes(n.id())) {
                n.addClass('impact-highlight');
            } else if (n.id() !== targetId) {
                n.addClass('dimmed');
            }
        });

        cy.edges().forEach(e => {
            const srcAffected = affected.includes(e.source().id()) || e.source().id() === targetId;
            const tgtAffected = affected.includes(e.target().id());
            if (srcAffected && tgtAffected) {
                e.addClass('impact-highlight');
            } else {
                e.addClass('dimmed');
            }
        });
    }

    function updateStep() {
        const step = demoSteps[currentStep];
        document.getElementById('narration').innerHTML = `<h2>${step.title}</h2>${step.content}`;
        document.getElementById('current-step').textContent = currentStep + 1;
        document.getElementById('total-steps').textContent = demoSteps.length;
        document.getElementById('progress-fill').style.width = `${((currentStep + 1) / demoSteps.length) * 100}%`;
        document.getElementById('btn-prev').disabled = currentStep === 0;
        document.getElementById('btn-next').textContent = currentStep === demoSteps.length - 1 ? 'Finish' : 'Next';

        if (step.action) step.action();
    }

    function nextStep() {
        if (currentStep < demoSteps.length - 1) {
            currentStep++;
            updateStep();
        } else {
            window.location.href = 'index.html';
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            updateStep();
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') {
            e.preventDefault();
            nextStep();
        } else if (e.key === 'ArrowLeft') {
            prevStep();
        } else if (e.key === 'Escape') {
            window.location.href = 'index.html';
        }
    });

    // Example dropdown handler
    document.getElementById('example-select').addEventListener('change', (e) => {
        loadGraph(e.target.value);
    });

    loadGraph();
    </script>
</body>
