<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quicue - Quick Demo</title>
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            overflow: hidden;
        }
        #cy {
            position: absolute;
            top: 60px;
            left: 0;
            right: 380px;
            bottom: 0;
            background: #161b22;
        }
        .header {
            height: 60px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 500;
        }
        .header h1 span { color: #8b949e; font-weight: 400; }
        .progress-dots {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            justify-content: center;
        }
        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #30363d;
            cursor: pointer;
            transition: all 0.2s;
        }
        .progress-dot:hover { background: #484f58; }
        .progress-dot.active { background: #238636; transform: scale(1.2); }
        .progress-dot.complete { background: #3fb950; }
        #example-select {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        #example-select:hover { background: #30363d; }
        .skip-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
        }
        .skip-link:hover { color: #c9d1d9; }
        .sidebar {
            position: absolute;
            top: 60px;
            right: 0;
            width: 380px;
            bottom: 0;
            background: #0d1117;
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        .narration {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }
        .narration h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #58a6ff;
        }
        .narration p {
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        .narration strong { color: #fff; }
        .narration .highlight { color: #3fb950; }
        .narration .warning { color: #d29922; }
        .narration .critical { color: #f85149; }
        .narration code {
            background: #21262d;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .controls {
            padding: 1rem 1.5rem;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 0.75rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            border: 1px solid #30363d;
            background: #21262d;
            color: #c9d1d9;
            transition: all 0.2s;
        }
        .btn:hover { background: #30363d; }
        .btn.primary {
            background: #238636;
            border-color: #238636;
            color: white;
            flex: 1;
        }
        .btn.primary:hover { background: #2ea043; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn.action {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            font-size: 1rem;
        }
        .btn.action:hover { background: #388bfd; }
        .btn.action:disabled {
            background: #21262d;
            border-color: #30363d;
            color: #8b949e;
        }
        .info-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #21262d;
            font-size: 0.9rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #8b949e; }
        .info-value { font-family: monospace; }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge.spof { background: #da363333; color: #f85149; }
        .badge.coupling { background: #d2992233; color: #d29922; }
        .badge.ok { background: #23863633; color: #3fb950; }
        .click-hint {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #1f6feb22;
            border: 1px solid #1f6feb;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        .click-hint::before {
            content: ">";
            color: #58a6ff;
            font-weight: bold;
        }
        .result-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .result-panel.success {
            border-color: #238636;
            background: #23863622;
        }
        .result-panel h4 {
            font-size: 0.85rem;
            color: #3fb950;
            margin-bottom: 0.5rem;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(88, 166, 255, 0); }
        }
        .pulse-hint {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>quicue <span>/ demo</span></h1>
        <div class="progress-dots" id="progress-dots"></div>
        <select id="example-select">
            <option value="incident-cascade">Incident Cascade (9 nodes)</option>
            <option value="operational">Ops Stack (8 nodes)</option>
            <option value="multi-region">Multi-Region (22 nodes)</option>
        </select>
        <a href="index.html" class="skip-link">Skip to Explorer</a>
    </div>

    <div id="cy"></div>

    <div class="sidebar">
        <div class="narration" id="narration"></div>
        <div class="controls">
            <button class="btn" id="btn-prev" onclick="prevStep()">Back</button>
            <button class="btn primary" id="btn-next" onclick="nextStep()">Next</button>
        </div>
    </div>

    <script>
    let cy = null;
    let currentStep = 0;
    let graphData = null;
    let simulatedNode = null;
    let currentExample = 'incident-cascade';
    let interactionComplete = false;

    // Streamlined 5-step demo
    function generateSteps() {
        const nodeCount = graphData.nodes.length;
        const edgeCount = graphData.edges.length;
        const maxDepth = graphData.metrics?.maxDepth || Math.max(...graphData.nodes.map(n => n.depth));

        // Find best target for impact demo (high dependents, not root)
        const impactTarget = graphData.nodes
            .filter(n => n.dependents > 0 && n.depth > 0)
            .sort((a, b) => b.dependents - a.dependents)[0] || graphData.nodes[1];

        const affectedNodes = graphData.nodes.filter(n =>
            n.ancestors && n.ancestors.includes(impactTarget?.id)
        );

        // Find SPOFs
        const spofs = (graphData.spof || []).slice(0, 3);
        const primarySpof = spofs[0] || impactTarget;

        // Coupling points
        const coupling = graphData.coupling || graphData.nodes
            .filter(n => n.dependents > nodeCount * 0.3)
            .slice(0, 2);

        return [
        // Step 1: The Graph (combined intro)
        {
            title: "Your Infrastructure",
            content: '<p>This is your infrastructure as a <strong>dependency graph</strong>.</p>' +
                '<div class="info-panel">' +
                '<div class="info-row"><span class="info-label">Resources</span><span class="info-value">' + nodeCount + '</span></div>' +
                '<div class="info-row"><span class="info-label">Dependencies</span><span class="info-value">' + edgeCount + '</span></div>' +
                '<div class="info-row"><span class="info-label">Layers</span><span class="info-value">' + (maxDepth + 1) + '</span></div>' +
                '</div>' +
                '<p>Node color shows <strong>criticality</strong> - redder means more things depend on it.</p>' +
                '<p>The problem: <em>what breaks if something fails?</em></p>',
            action: function() {
                resetGraph();
                cy.fit(50);
            }
        },

        // Step 2: Impact Analysis (interactive)
        {
            title: "Impact Analysis",
            content: '<p>Click <code>' + (impactTarget?.id || 'a node') + '</code> to see what breaks if it fails.</p>' +
                '<div class="click-hint">Click the highlighted node in the graph</div>' +
                '<div id="impact-result"></div>',
            action: function() {
                resetGraph();
                interactionComplete = false;
                updateNextButton();

                // Highlight the target node
                var target = cy.$id(impactTarget?.id);
                if (target.length) {
                    target.addClass('pulse-hint');
                    cy.animate({ center: { eles: target }, zoom: 1.2, duration: 500 });
                }

                // Set up click handler
                cy.once('tap', 'node', function(evt) {
                    var nodeId = evt.target.id();
                    showImpact(nodeId);

                    var affected = graphData.nodes.filter(function(n) {
                        return n.ancestors && n.ancestors.includes(nodeId);
                    });

                    var resultEl = document.getElementById('impact-result');
                    var affectedList = affected.slice(0, 4).map(function(n) { return n.id; }).join(', ');
                    if (affected.length > 4) affectedList += '...';

                    resultEl.innerHTML = '<div class="result-panel">' +
                        '<h4>Blast Radius</h4>' +
                        '<p><span class="critical">' + affected.length + ' service' + (affected.length !== 1 ? 's' : '') + '</span> would fail:</p>' +
                        '<p style="font-size: 0.85rem; color: #8b949e;">' + affectedList + '</p>' +
                        '</div>';
                    interactionComplete = true;
                    updateNextButton();
                });
            },
            requiresInteraction: true
        },

        // Step 3: Risk Detection (SPOF + Coupling combined)
        {
            title: "Risk Detection",
            content: (function() {
                var html = '<p>quicue automatically finds risks:</p>' +
                    '<div class="info-panel">' +
                    '<div class="info-row"><span class="info-label">Single Points of Failure</span><span class="badge spof">' + spofs.length + ' found</span></div>';
                spofs.forEach(function(s) {
                    html += '<div class="info-row"><span class="info-label" style="padding-left: 1rem;">' + (s.name || s.id) + '</span><span class="info-value">' + s.dependents + ' dependents</span></div>';
                });
                html += '</div>';
                if (coupling.length > 0) {
                    html += '<div class="info-panel">' +
                        '<div class="info-row"><span class="info-label">Coupling Hotspots</span><span class="badge coupling">' + coupling.length + ' found</span></div>';
                    coupling.forEach(function(c) {
                        var pct = c.percentage || Math.round((c.dependents / (nodeCount - 1)) * 100);
                        html += '<div class="info-row"><span class="info-label" style="padding-left: 1rem;">' + (c.name || c.id) + '</span><span class="info-value">' + pct + '% depend on this</span></div>';
                    });
                    html += '</div>';
                }
                html += '<p><strong>SPOF</strong> = no redundant peer at same layer.<br><strong>Coupling</strong> = too many things depend on one resource.</p>';
                return html;
            })(),
            action: function() {
                resetGraph();
                spofs.forEach(function(s) {
                    cy.$id(s.name || s.id).addClass('impact-source');
                });
                coupling.forEach(function(c) {
                    var cId = c.name || c.id;
                    if (!spofs.find(function(s) { return (s.name || s.id) === cId; })) {
                        cy.$id(cId).addClass('impact-highlight');
                    }
                });
                cy.fit(50);
            }
        },

        // Step 4: Add Replica (one-click)
        {
            title: "Fix It",
            content: (function() {
                if (!primarySpof) return '<p>No SPOFs to fix in this example.</p>';
                var spofId = primarySpof.name || primarySpof.id;
                return '<p><code>' + spofId + '</code> is a single point of failure.</p>' +
                    '<p>Add a replica to provide redundancy:</p>' +
                    '<button class="btn action" id="btn-add-replica">Add ' + spofId + '-replica</button>' +
                    '<div id="replica-result"></div>';
            })(),
            action: function() {
                resetGraph();
                if (!primarySpof) return;

                var spofId = primarySpof.name || primarySpof.id;
                cy.$id(spofId).addClass('impact-source');
                cy.animate({ center: { eles: cy.$id(spofId) }, zoom: 1.3, duration: 500 });

                setTimeout(function() {
                    var btn = document.getElementById('btn-add-replica');
                    if (btn) {
                        btn.onclick = function() {
                            addReplicaNode(spofId);
                            btn.disabled = true;
                            btn.textContent = 'Added!';

                            document.getElementById('replica-result').innerHTML =
                                '<div class="result-panel success">' +
                                '<h4>SPOF Resolved</h4>' +
                                '<p><code>' + spofId + '</code> now has a redundant peer.</p>' +
                                '<p style="font-size: 0.85rem; color: #8b949e;">If the primary fails, the replica can take over.</p>' +
                                '</div>';
                        };
                    }
                }, 100);
            }
        },

        // Step 5: Explore (CTA)
        {
            title: "Explore",
            content: '<p>That\'s quicue: <strong>infrastructure as a queryable graph</strong>.</p>' +
                '<div class="info-panel">' +
                '<div class="info-row"><span class="info-label">Impact analysis</span><span class="info-value">What breaks if X fails?</span></div>' +
                '<div class="info-row"><span class="info-label">SPOF detection</span><span class="info-value">Find single points of failure</span></div>' +
                '<div class="info-row"><span class="info-label">Deployment order</span><span class="info-value">Safe startup/shutdown sequence</span></div>' +
                '<div class="info-row"><span class="info-label">What-if simulation</span><span class="info-value">Test changes before making them</span></div>' +
                '</div>' +
                '<a href="index.html" class="btn action" style="display: block; text-align: center; text-decoration: none;">Open Full Explorer</a>',
            action: function() {
                resetGraph();
                cy.fit(50);
            }
        }
        ];
    }

    var demoSteps = [];

    function resetGraph() {
        removeSimulatedNode();
        cy.elements().removeClass('highlighted dimmed impact-source impact-highlight pulse-hint');
    }

    function addReplicaNode(baseId) {
        var baseNode = graphData.nodes.find(function(n) { return n.id === baseId; });
        if (!baseNode || simulatedNode) return;

        var replicaId = baseId + '-replica';

        cy.add({
            group: 'nodes',
            data: {
                id: replicaId,
                dependents: 0,
                depth: baseNode.depth,
                simulated: true
            },
            classes: 'simulated-node'
        });

        graphData.edges.filter(function(e) { return e.target === baseId; }).forEach(function(e) {
            cy.add({
                group: 'edges',
                data: {
                    id: e.source + '-' + replicaId,
                    source: e.source,
                    target: replicaId,
                    simulated: true
                },
                classes: 'simulated-edge'
            });
        });

        var originalPos = cy.$id(baseId).position();
        cy.$id(replicaId).position({
            x: originalPos.x + 80,
            y: originalPos.y + 60
        });

        cy.$id(replicaId).style({
            'border-style': 'dashed',
            'border-color': '#3fb950',
            'border-width': 3,
            'background-color': '#238636',
            'label': replicaId
        });

        cy.edges('[simulated]').style({
            'line-style': 'dashed',
            'line-color': '#3fb950',
            'target-arrow-color': '#3fb950'
        });

        cy.$id(baseId).removeClass('impact-source').addClass('impact-highlight');
        cy.$id(replicaId).addClass('impact-highlight');

        simulatedNode = replicaId;
        cy.fit(50);
    }

    function removeSimulatedNode() {
        if (simulatedNode) {
            cy.$id(simulatedNode).remove();
            cy.edges('[simulated]').remove();
            simulatedNode = null;
        }
    }

    async function loadGraph(example) {
        currentExample = example || 'incident-cascade';
        var resp = await fetch('data/' + currentExample + '.json');
        graphData = await resp.json();
        demoSteps = generateSteps();
        currentStep = 0;
        simulatedNode = null;
        interactionComplete = false;
        initCytoscape();
        renderProgressDots();
        updateStep();
    }

    function initCytoscape() {
        var maxDeps = Math.max.apply(null, graphData.nodes.map(function(n) { return n.dependents; }));
        var rootNode = graphData.nodes.find(function(n) { return n.depth === 0; });
        var rootId = (graphData.roots && graphData.roots[0]) || (rootNode && rootNode.id);

        cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [
                ...graphData.nodes.map(function(n) {
                    return { data: Object.assign({ id: n.id }, n) };
                }),
                ...graphData.edges.map(function(e) {
                    return { data: { id: e.source + '-' + e.target, source: e.source, target: e.target } };
                })
            ],
            style: [
                {
                    selector: 'node',
                    style: {
                        'label': 'data(id)',
                        'text-valign': 'bottom',
                        'text-margin-y': 8,
                        'font-size': '12px',
                        'color': '#8b949e',
                        'background-color': function(ele) { return criticalityColor(ele.data('dependents'), maxDeps); },
                        'width': 40,
                        'height': 40,
                        'border-width': 2,
                        'border-color': '#30363d'
                    }
                },
                { selector: 'node.impact-source', style: { 'background-color': '#f85149', 'border-color': '#ff7b72', 'border-width': 4 } },
                { selector: 'node.impact-highlight', style: { 'border-color': '#3fb950', 'border-width': 3 } },
                { selector: 'node.pulse-hint', style: { 'border-color': '#58a6ff', 'border-width': 4 } },
                { selector: 'node.dimmed', style: { 'opacity': 0.2 } },
                { selector: 'node.simulated-node', style: { 'border-style': 'dashed', 'border-color': '#3fb950', 'border-width': 3, 'background-color': '#238636' } },
                { selector: 'edge', style: { 'width': 2, 'line-color': '#30363d', 'target-arrow-color': '#30363d', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier' } },
                { selector: 'edge.impact-highlight', style: { 'line-color': '#f85149', 'target-arrow-color': '#f85149', 'width': 3 } },
                { selector: 'edge.dimmed', style: { 'opacity': 0.1 } },
                { selector: 'edge.simulated-edge', style: { 'line-style': 'dashed', 'line-color': '#3fb950', 'target-arrow-color': '#3fb950' } }
            ],
            layout: {
                name: 'breadthfirst',
                directed: true,
                roots: rootId ? '#' + rootId : undefined,
                spacingFactor: 1.5
            }
        });
    }

    function criticalityColor(deps, max) {
        if (max === 0) return '#58a6ff';
        var ratio = deps / max;
        if (ratio < 0.5) {
            var r = Math.round(88 + (240 - 88) * (ratio * 2));
            var g = Math.round(166 + (136 - 166) * (ratio * 2));
            var b = Math.round(255 + (62 - 255) * (ratio * 2));
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        } else {
            var r = Math.round(240 + (248 - 240) * ((ratio - 0.5) * 2));
            var g = Math.round(136 - 136 * ((ratio - 0.5) * 2));
            var b = Math.round(62 - 62 * ((ratio - 0.5) * 2));
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }
    }

    function showImpact(targetId) {
        cy.elements().removeClass('impact-source impact-highlight dimmed pulse-hint');
        var target = cy.$id(targetId);
        if (!target.length) return;

        target.addClass('impact-source');

        var affected = graphData.nodes.filter(function(n) {
            return n.ancestors && n.ancestors.includes(targetId);
        }).map(function(n) { return n.id; });

        cy.nodes().forEach(function(n) {
            if (affected.includes(n.id())) {
                n.addClass('impact-highlight');
            } else if (n.id() !== targetId) {
                n.addClass('dimmed');
            }
        });

        cy.edges().forEach(function(e) {
            var srcAffected = affected.includes(e.source().id()) || e.source().id() === targetId;
            var tgtAffected = affected.includes(e.target().id());
            if (srcAffected && tgtAffected) {
                e.addClass('impact-highlight');
            } else {
                e.addClass('dimmed');
            }
        });
    }

    function renderProgressDots() {
        var container = document.getElementById('progress-dots');
        var html = '';
        for (var i = 0; i < demoSteps.length; i++) {
            html += '<div class="progress-dot" data-step="' + i + '" onclick="goToStep(' + i + ')"></div>';
        }
        container.innerHTML = html;
        updateProgressDots();
    }

    function updateProgressDots() {
        var dots = document.querySelectorAll('.progress-dot');
        dots.forEach(function(dot, i) {
            dot.classList.remove('active', 'complete');
            if (i < currentStep) dot.classList.add('complete');
            if (i === currentStep) dot.classList.add('active');
        });
    }

    function updateNextButton() {
        var step = demoSteps[currentStep];
        var btn = document.getElementById('btn-next');
        if (step.requiresInteraction && !interactionComplete) {
            btn.disabled = true;
            btn.textContent = 'Click the graph';
        } else {
            btn.disabled = false;
            btn.textContent = currentStep === demoSteps.length - 1 ? 'Finish' : 'Next';
        }
    }

    function updateStep() {
        var step = demoSteps[currentStep];
        document.getElementById('narration').innerHTML = '<h2>' + step.title + '</h2>' + step.content;
        document.getElementById('btn-prev').disabled = currentStep === 0;
        updateProgressDots();
        updateNextButton();

        if (step.action) step.action();
    }

    function nextStep() {
        if (currentStep < demoSteps.length - 1) {
            currentStep++;
            interactionComplete = false;
            updateStep();
        } else {
            window.location.href = 'index.html';
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            interactionComplete = false;
            updateStep();
        }
    }

    function goToStep(step) {
        if (step >= 0 && step < demoSteps.length) {
            currentStep = step;
            interactionComplete = false;
            updateStep();
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ') {
            e.preventDefault();
            if (!demoSteps[currentStep]?.requiresInteraction || interactionComplete) {
                nextStep();
            }
        } else if (e.key === 'ArrowLeft') {
            prevStep();
        } else if (e.key === 'Escape') {
            window.location.href = 'index.html';
        }
    });

    document.getElementById('example-select').addEventListener('change', function(e) {
        loadGraph(e.target.value);
    });

    loadGraph();
    </script>
</body>
</html>
