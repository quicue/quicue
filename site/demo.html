<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quicue - Quick Demo</title>
    <link rel="stylesheet" href="shared.css">
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <script src="shared.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            overflow: hidden;
        }
        #cy {
            position: absolute;
            top: 60px;
            left: 0;
            right: 380px;
            bottom: 0;
            background: #161b22;
        }
        .header {
            height: 60px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 500;
        }
        .header h1 span { color: #8b949e; font-weight: 400; }
        .progress-dots {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            justify-content: center;
        }
        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #30363d;
            cursor: pointer;
            transition: all 0.2s;
        }
        .progress-dot:hover { background: #484f58; }
        .progress-dot.active { background: #238636; transform: scale(1.2); }
        .progress-dot.complete { background: #3fb950; }
        #example-select {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        #example-select:hover { background: #30363d; }
        .skip-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
        }
        .skip-link:hover { color: #c9d1d9; }
        .sidebar {
            position: absolute;
            top: 60px;
            right: 0;
            width: 380px;
            bottom: 0;
            background: #0d1117;
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        .narration {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }
        .narration h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #58a6ff;
        }
        .narration p {
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        .narration strong { color: #fff; }
        .narration .highlight { color: #3fb950; }
        .narration .warning { color: #d29922; }
        .narration .critical { color: #f85149; }
        .narration code {
            background: #21262d;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .controls {
            padding: 1rem 1.5rem;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 0.75rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            border: 1px solid #30363d;
            background: #21262d;
            color: #c9d1d9;
            transition: all 0.2s;
        }
        .btn:hover { background: #30363d; }
        .btn.primary {
            background: #238636;
            border-color: #238636;
            color: white;
            flex: 1;
        }
        .btn.primary:hover { background: #2ea043; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn.action {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            font-size: 1rem;
        }
        .btn.action:hover { background: #388bfd; }
        .btn.action:disabled {
            background: #21262d;
            border-color: #30363d;
            color: #8b949e;
        }
        .info-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #21262d;
            font-size: 0.9rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #8b949e; }
        .info-value { font-family: monospace; }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge.spof { background: #da363333; color: #f85149; }
        .badge.coupling { background: #d2992233; color: #d29922; }
        .badge.ok { background: #23863633; color: #3fb950; }
        .click-hint {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #1f6feb22;
            border: 1px solid #1f6feb;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        .click-hint::before {
            content: ">";
            color: #58a6ff;
            font-weight: bold;
        }
        .cue-expr {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.75rem;
            margin: 0.75rem 0;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.8rem;
            overflow-x: auto;
        }
        .cue-expr .keyword { color: #ff7b72; }
        .cue-expr .field { color: #79c0ff; }
        .cue-expr .string { color: #a5d6ff; }
        .cue-result {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.75rem;
            margin: 0.75rem 0;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .cue-result-label {
            font-size: 0.7rem;
            color: #8b949e;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }
        .result-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .result-panel.success {
            border-color: #238636;
            background: #23863622;
        }
        .result-panel h4 {
            font-size: 0.85rem;
            color: #3fb950;
            margin-bottom: 0.5rem;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(88, 166, 255, 0); }
        }
        .pulse-hint {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>quicue <span>/ demo</span></h1>
        <div class="progress-dots" id="progress-dots"></div>
        <select id="example-select">
            <option value="incident-cascade">Incident Cascade (9 nodes)</option>
            <option value="operational">Web Stack (8 nodes)</option>
            <option value="cicd-pipeline">CI/CD Pipeline (9 nodes)</option>
            <option value="microservices-mesh">Microservices (12 nodes)</option>
            <option value="multi-region">Multi-Region (22 nodes)</option>
            <option value="graph-patterns">Minimal (5 nodes)</option>
        </select>
        <a href="index.html" class="skip-link">Skip to Explorer</a>
    </div>

    <div id="cy"></div>

    <div class="sidebar">
        <div class="narration" id="narration"></div>
        <div class="controls">
            <button class="btn" id="btn-prev" onclick="prevStep()">Back</button>
            <button class="btn primary" id="btn-next" onclick="nextStep()">Next</button>
        </div>
    </div>

    <script>
    let cy = null;
    let currentStep = 0;
    let graphData = null;
    let currentExample = 'incident-cascade';
    let interactionComplete = false;

    // Query-focused demo showing CUE patterns
    function generateSteps() {
        const nodeCount = graphData.nodes.length;
        const edgeCount = graphData.edges.length;
        const maxDepth = graphData.metrics?.maxDepth || Math.max(...graphData.nodes.map(n => n.depth));

        // Find target for impact demo (high dependents, not root)
        const impactTarget = graphData.nodes
            .filter(n => n.dependents > 0 && n.depth > 0)
            .sort((a, b) => b.dependents - a.dependents)[0] || graphData.nodes[1];

        // Find a leaf node for chain demo
        const chainTarget = graphData.nodes
            .filter(n => n.dependents === 0 && n.ancestors && n.ancestors.length > 1)
            .sort((a, b) => b.ancestors.length - a.ancestors.length)[0] || graphData.leaves?.[0] || graphData.nodes[nodeCount - 1];

        // Criticality ranking
        const criticalityRanked = [...graphData.nodes].sort((a, b) => b.dependents - a.dependents);

        // Topology layers
        const topology = graphData.topology || {};

        // Group by type
        const byType = graphData.byType || {};

        // Find nodes for immediate dependents demo
        const immediateTarget = graphData.nodes.find(n => n.dependents > 1) || impactTarget;
        const immediateDeps = graphData.nodes.filter(n => {
            const deps = n.depends_on || (n.ancestors && n.ancestors.length === 1 ? n.ancestors : []);
            return deps && deps.includes && deps.includes(immediateTarget.id);
        }).map(n => n.id);

        // Find two nodes for path demo
        const pathFrom = graphData.roots && graphData.roots[0] || graphData.nodes[0].id;
        const pathTo = graphData.leaves && graphData.leaves[0] || graphData.nodes[graphData.nodes.length - 1].id;

        return [
        // Step 1: Welcome
        {
            title: "quicue",
            content: '<p><strong>Infrastructure as queryable graphs.</strong></p>' +
                '<p>Dependencies become traversable edges. Run queries to analyze impact, find paths, and validate your infrastructure.</p>' +
                '<div class="info-panel">' +
                '<div class="info-row"><span class="info-label">Nodes</span><span class="info-value">' + nodeCount + '</span></div>' +
                '<div class="info-row"><span class="info-label">Edges</span><span class="info-value">' + edgeCount + '</span></div>' +
                '<div class="info-row"><span class="info-label">Max Depth</span><span class="info-value">' + maxDepth + '</span></div>' +
                '</div>' +
                '<p style="font-size: 0.85rem; color: #8b949e;">Use arrow keys or click Next to continue.</p>',
            action: function() {
                resetGraph();
                cy.fit(50);
            }
        },

        // Step 2: Topology
        {
            title: "#InfraGraph.topology",
            content: '<p>Resources grouped by dependency depth. Layer 0 has no dependencies (roots).</p>' +
                '<div class="cue-expr"><span class="field">infra</span>.topology</div>' +
                '<div class="cue-result-label">Result</div>' +
                '<div class="cue-result">' + JSON.stringify(topology, null, 2) + '</div>',
            action: function() {
                resetGraph();
                cy.fit(50);
            }
        },

        // Step 3: Impact Query
        {
            title: "#ImpactQuery",
            content: '<p>What fails if <code>' + impactTarget.id + '</code> goes down? (Blast radius)</p>' +
                '<div class="cue-expr"><span class="field">impact</span>: <span class="keyword">#ImpactQuery</span> & {<br>' +
                '  <span class="field">Graph</span>: infra<br>' +
                '  <span class="field">Target</span>: <span class="string">"' + impactTarget.id + '"</span><br>' +
                '}</div>' +
                '<div class="click-hint">Click the highlighted node to run query</div>' +
                '<div id="impact-result"></div>',
            action: function() {
                resetGraph();
                interactionComplete = false;
                updateNextButton();

                var target = cy.$id(impactTarget.id);
                if (target.length) {
                    target.addClass('pulse-hint');
                    cy.animate({ center: { eles: target }, zoom: 1.2, duration: 500 });
                }

                cy.once('tap', 'node', function(evt) {
                    var nodeId = evt.target.id();
                    showImpact(nodeId);

                    var affected = graphData.nodes.filter(function(n) {
                        return n.ancestors && n.ancestors.includes(nodeId);
                    }).map(function(n) { return n.id; });

                    document.getElementById('impact-result').innerHTML =
                        '<div class="cue-result-label">impact.affected</div>' +
                        '<div class="cue-result">' + JSON.stringify(affected, null, 2) + '</div>';
                    interactionComplete = true;
                    updateNextButton();
                });
            },
            requiresInteraction: true
        },

        // Step 4: Dependency Chain
        {
            title: "#DependencyChain",
            content: '<p>Path from <code>' + chainTarget.id + '</code> up to roots.</p>' +
                '<div class="cue-expr"><span class="field">chain</span>: <span class="keyword">#DependencyChain</span> & {<br>' +
                '  <span class="field">Graph</span>: infra<br>' +
                '  <span class="field">Target</span>: <span class="string">"' + chainTarget.id + '"</span><br>' +
                '}</div>' +
                '<div class="cue-result-label">chain.path</div>' +
                '<div class="cue-result">' + JSON.stringify([chainTarget.id].concat(chainTarget.ancestors || []), null, 2) + '</div>',
            action: function() {
                resetGraph();
                var targetNode = cy.$id(chainTarget.id);
                var ancestorIds = chainTarget.ancestors || [];

                targetNode.addClass('impact-source');
                ancestorIds.forEach(function(id) {
                    cy.$id(id).addClass('impact-highlight');
                });

                cy.edges().forEach(function(e) {
                    var srcInChain = ancestorIds.includes(e.source().id()) || e.source().id() === chainTarget.id;
                    var tgtInChain = ancestorIds.includes(e.target().id()) || e.target().id() === chainTarget.id;
                    if (srcInChain && tgtInChain) {
                        e.addClass('impact-highlight');
                    } else {
                        e.addClass('dimmed');
                    }
                });

                cy.nodes().forEach(function(n) {
                    if (!ancestorIds.includes(n.id()) && n.id() !== chainTarget.id) {
                        n.addClass('dimmed');
                    }
                });

                cy.fit(50);
            }
        },

        // Step 5: Immediate Dependents
        {
            title: "#ImmediateDependents",
            content: '<p>Direct dependents only (not transitive) for <code>' + immediateTarget.id + '</code>.</p>' +
                '<div class="cue-expr"><span class="field">deps</span>: <span class="keyword">#ImmediateDependents</span> & {<br>' +
                '  <span class="field">Graph</span>: infra<br>' +
                '  <span class="field">Target</span>: <span class="string">"' + immediateTarget.id + '"</span><br>' +
                '}</div>' +
                '<div class="cue-result-label">deps.dependents</div>' +
                '<div class="cue-result">' + JSON.stringify(immediateDeps.length > 0 ? immediateDeps : ['(none - try a different example)'], null, 2) + '</div>' +
                '<p style="font-size: 0.85rem; color: #8b949e; margin-top: 0.5rem;">Unlike #ImpactQuery, this only shows <em>direct</em> dependents.</p>',
            action: function() {
                resetGraph();
                var target = cy.$id(immediateTarget.id);
                target.addClass('impact-source');
                immediateDeps.forEach(function(id) {
                    cy.$id(id).addClass('impact-highlight');
                });
                cy.nodes().forEach(function(n) {
                    if (n.id() !== immediateTarget.id && !immediateDeps.includes(n.id())) {
                        n.addClass('dimmed');
                    }
                });
                cy.fit(50);
            }
        },

        // Step 6: Criticality Rank
        {
            title: "#CriticalityRank",
            content: '<p>Resources ordered by dependent count (most critical first).</p>' +
                '<div class="cue-expr"><span class="field">crit</span>: <span class="keyword">#CriticalityRank</span> & {<span class="field">Graph</span>: infra}</div>' +
                '<div class="cue-result-label">crit.ranked</div>' +
                '<div class="cue-result">' + JSON.stringify(criticalityRanked.slice(0, 6).map(function(n) {
                    return { id: n.id, dependents: n.dependents };
                }), null, 2) + '</div>',
            action: function() {
                resetGraph();
                criticalityRanked.slice(0, 3).forEach(function(n, i) {
                    if (i === 0) {
                        cy.$id(n.id).addClass('impact-source');
                    } else {
                        cy.$id(n.id).addClass('impact-highlight');
                    }
                });
                cy.fit(50);
            }
        },

        // Step 7: Group By Type
        {
            title: "#GroupByType",
            content: '<p>Resources grouped by their @type values.</p>' +
                '<div class="cue-expr"><span class="field">byType</span>: <span class="keyword">#GroupByType</span> & {<span class="field">Graph</span>: infra}</div>' +
                '<div class="cue-result-label">byType.groups</div>' +
                '<div class="cue-result">' + JSON.stringify(Object.keys(byType).length > 0 ? byType : {note: 'Run with multi-region example'}, null, 2) + '</div>',
            action: function() {
                resetGraph();
                cy.fit(50);
            }
        },

        // Step 8: Validate Graph
        {
            title: "#ValidateGraph",
            content: '<p>Check for common issues: missing deps, self-refs, cycles.</p>' +
                '<div class="cue-expr"><span class="field">validate</span>: <span class="keyword">#ValidateGraph</span> & {<span class="field">Input</span>: resources}</div>' +
                '<div class="info-panel">' +
                '<div class="info-row"><span class="info-label">Missing deps</span><span class="info-value">refs to non-existent nodes</span></div>' +
                '<div class="info-row"><span class="info-label">Self refs</span><span class="info-value">nodes depending on themselves</span></div>' +
                '<div class="info-row"><span class="info-label">Empty types</span><span class="info-value">nodes without @type</span></div>' +
                '</div>',
            action: function() {
                resetGraph();
                cy.fit(50);
            }
        },

        // Step 9: D3 Visualizations
        {
            title: "D3 Visualizations",
            content: '<p>8 different ways to visualize your graph:</p>' +
                '<div class="info-panel">' +
                '<div class="info-row"><span class="info-label">Sankey</span><span class="info-value">dependency flow</span></div>' +
                '<div class="info-row"><span class="info-label">Chord</span><span class="info-value">type relationships</span></div>' +
                '<div class="info-row"><span class="info-label">Matrix</span><span class="info-value">adjacency grid</span></div>' +
                '<div class="info-row"><span class="info-label">Treemap</span><span class="info-value">grouped by type</span></div>' +
                '<div class="info-row"><span class="info-label">Sunburst</span><span class="info-value">depth hierarchy</span></div>' +
                '<div class="info-row"><span class="info-label">Force</span><span class="info-value">draggable layout</span></div>' +
                '<div class="info-row"><span class="info-label">Bundle</span><span class="info-value">edge bundling</span></div>' +
                '<div class="info-row"><span class="info-label">Gantt</span><span class="info-value">deployment order</span></div>' +
                '</div>',
            action: function() {
                resetGraph();
                cy.fit(50);
            }
        },

        // Step 10: Full Explorer
        {
            title: "Explorer",
            content: '<p>The full explorer also includes:</p>' +
                '<div class="info-panel">' +
                '<div class="info-row"><span class="info-label">#PathFinder</span><span class="info-value">shortest path between nodes</span></div>' +
                '<div class="info-row"><span class="info-label">Graph Diff</span><span class="info-value">compare two states</span></div>' +
                '<div class="info-row"><span class="info-label">Export</span><span class="info-value">DOT, Mermaid, PlantUML</span></div>' +
                '<div class="info-row"><span class="info-label">Import</span><span class="info-value">Terraform, Pulumi, Proxmox</span></div>' +
                '</div>' +
                '<p style="font-size: 0.85rem; color: #8b949e; margin-top: 1rem;">Press <code>?</code> for keyboard shortcuts</p>' +
                '<a href="index.html" class="btn action" style="display: block; text-align: center; text-decoration: none;">Open Explorer</a>',
            action: function() {
                resetGraph();
                cy.fit(50);
            }
        }
        ];
    }

    var demoSteps = [];

    function resetGraph() {
        cy.elements().removeClass('highlighted dimmed impact-source impact-highlight pulse-hint');
    }

    async function loadGraph(example) {
        currentExample = example || 'incident-cascade';
        var resp = await fetch('data/' + currentExample + '.json');
        graphData = await resp.json();
        demoSteps = generateSteps();
        currentStep = 0;
        interactionComplete = false;
        initCytoscape();
        renderProgressDots();
        updateStep();
    }

    function initCytoscape() {
        var maxDeps = Math.max.apply(null, graphData.nodes.map(function(n) { return n.dependents; }));
        var rootNode = graphData.nodes.find(function(n) { return n.depth === 0; });
        var rootId = (graphData.roots && graphData.roots[0]) || (rootNode && rootNode.id);

        cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [
                ...graphData.nodes.map(function(n) {
                    return { data: Object.assign({ id: n.id }, n) };
                }),
                ...graphData.edges.map(function(e) {
                    return { data: { id: e.source + '-' + e.target, source: e.source, target: e.target } };
                })
            ],
            style: [
                {
                    selector: 'node',
                    style: {
                        'label': 'data(id)',
                        'text-valign': 'bottom',
                        'text-margin-y': 8,
                        'font-size': '12px',
                        'color': '#8b949e',
                        'background-color': function(ele) { return criticalityColor(ele.data('dependents'), maxDeps); },
                        'width': 40,
                        'height': 40,
                        'border-width': 2,
                        'border-color': '#30363d'
                    }
                },
                { selector: 'node.impact-source', style: { 'background-color': '#f85149', 'border-color': '#ff7b72', 'border-width': 4 } },
                { selector: 'node.impact-highlight', style: { 'border-color': '#3fb950', 'border-width': 3 } },
                { selector: 'node.pulse-hint', style: { 'border-color': '#58a6ff', 'border-width': 4 } },
                { selector: 'node.dimmed', style: { 'opacity': 0.2 } },
                { selector: 'edge', style: { 'width': 2, 'line-color': '#30363d', 'target-arrow-color': '#30363d', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier' } },
                { selector: 'edge.impact-highlight', style: { 'line-color': '#f85149', 'target-arrow-color': '#f85149', 'width': 3 } },
                { selector: 'edge.dimmed', style: { 'opacity': 0.1 } }
            ],
            layout: {
                name: 'breadthfirst',
                directed: true,
                roots: rootId ? '#' + rootId : undefined,
                spacingFactor: 1.5
            }
        });
    }

    // criticalityColor imported from shared.js

    function showImpact(targetId) {
        cy.elements().removeClass('impact-source impact-highlight dimmed pulse-hint');
        var target = cy.$id(targetId);
        if (!target.length) return;

        target.addClass('impact-source');

        var affected = graphData.nodes.filter(function(n) {
            return n.ancestors && n.ancestors.includes(targetId);
        }).map(function(n) { return n.id; });

        cy.nodes().forEach(function(n) {
            if (affected.includes(n.id())) {
                n.addClass('impact-highlight');
            } else if (n.id() !== targetId) {
                n.addClass('dimmed');
            }
        });

        cy.edges().forEach(function(e) {
            var srcAffected = affected.includes(e.source().id()) || e.source().id() === targetId;
            var tgtAffected = affected.includes(e.target().id());
            if (srcAffected && tgtAffected) {
                e.addClass('impact-highlight');
            } else {
                e.addClass('dimmed');
            }
        });
    }

    function renderProgressDots() {
        var container = document.getElementById('progress-dots');
        var html = '';
        for (var i = 0; i < demoSteps.length; i++) {
            html += '<div class="progress-dot" data-step="' + i + '" onclick="goToStep(' + i + ')"></div>';
        }
        container.innerHTML = html;
        updateProgressDots();
    }

    function updateProgressDots() {
        var dots = document.querySelectorAll('.progress-dot');
        dots.forEach(function(dot, i) {
            dot.classList.remove('active', 'complete');
            if (i < currentStep) dot.classList.add('complete');
            if (i === currentStep) dot.classList.add('active');
        });
    }

    function updateNextButton() {
        var step = demoSteps[currentStep];
        var btn = document.getElementById('btn-next');
        if (step.requiresInteraction && !interactionComplete) {
            btn.disabled = true;
            btn.textContent = 'Click the graph';
        } else {
            btn.disabled = false;
            btn.textContent = currentStep === demoSteps.length - 1 ? 'Finish' : 'Next';
        }
    }

    function updateStep() {
        var step = demoSteps[currentStep];
        var stepCounter = '<div style="font-size: 0.75rem; color: #8b949e; margin-bottom: 0.5rem;">Step ' + (currentStep + 1) + ' of ' + demoSteps.length + '</div>';
        // Note: innerHTML used with trusted static content only (no user input)
        document.getElementById('narration').innerHTML = stepCounter + '<h2>' + step.title + '</h2>' + step.content;
        document.getElementById('btn-prev').disabled = currentStep === 0;
        updateProgressDots();
        updateNextButton();

        if (step.action) step.action();
    }

    function nextStep() {
        if (currentStep < demoSteps.length - 1) {
            currentStep++;
            interactionComplete = false;
            updateStep();
        } else {
            window.location.href = 'index.html';
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            interactionComplete = false;
            updateStep();
        }
    }

    function goToStep(step) {
        if (step >= 0 && step < demoSteps.length) {
            currentStep = step;
            interactionComplete = false;
            updateStep();
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ') {
            e.preventDefault();
            if (!demoSteps[currentStep]?.requiresInteraction || interactionComplete) {
                nextStep();
            }
        } else if (e.key === 'ArrowLeft') {
            prevStep();
        } else if (e.key === 'Escape') {
            window.location.href = 'index.html';
        }
    });

    document.getElementById('example-select').addEventListener('change', function(e) {
        loadGraph(e.target.value);
    });

    loadGraph();
    </script>
</body>
</html>
